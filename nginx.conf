server {
    listen 80;
    server_name yourdomain.com;

    root /var/www/website-new;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Cache static files
    location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
        expires 30d;
        access_log off;
    }

    # Error page
    error_page 404 /index.html;
}